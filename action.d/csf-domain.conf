# Fail2Ban action - Ban via CSF with jail name and affected domain(s) in comment
# Comment format: Fail2Ban <jail> - <domain1, domain2, ...>
# No "do not delete" - concise format for csf.deny

[Definition]

actionstart =
actionstop =
actioncheck = /usr/sbin/csf -v >/dev/null 2>&1

actionban = /etc/fail2ban/scripts/csf-ban.sh <ip> <name>
actionunban = /usr/sbin/csf -dr <ip>
