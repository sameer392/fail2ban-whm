# Fail2Ban jail for high-volume traffic blocking
# Bans IPs with 500+ requests per hour (excluding crawlers)
# Use with caution: may affect legitimate high-traffic users (e.g. API clients, CDNs)

[apache-high-volume]
enabled = true
port = http,https
filter = apache-high-volume

logpath = /usr/local/apache/domlogs/*/*

# Ban after 500 requests within 1 hour
maxretry = 500
findtime = 3600
bantime = 3600

# Use CSF for banning (persists across fail2ban restarts)
# Comment in csf.deny: "Fail2Ban apache-high-volume - domain.com"
banaction = csf-domain
banaction_allports = csf-domain
