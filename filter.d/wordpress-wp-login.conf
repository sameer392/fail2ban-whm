# Fail2Ban filter for WordPress wp-login.php brute force attacks
# Works with Apache/LiteSpeed combined log format (cPanel/WHM)
# Matches any request to wp-login.php - bans IPs that hit it too often

[Definition]
# Combined log format: IP - - [date] "METHOD /path HTTP/x.x" ...
# Handles wp-login.php at root or in subdirectory (e.g. /blog/wp-login.php)
# Whitelist: run ./update-whitelist.sh after editing whitelist-ips.conf
failregex = ^<HOST> -.*"(GET|POST) .*wp-login\.php
ignoreregex = ^173\.208\.207\.(168|169|170|171|172|173|174|175)|^173\.208\.157\.(32|33|34|35|36|37|38|39)|^204\.12\.247\.(40|41|42|43|44|45|46|47)
