# Fail2Ban filter for high-volume traffic (500+ requests per hour)
# Matches all requests, excludes known crawlers (same logic as find_suspicious_ips.sh)
# Works with Apache/LiteSpeed combined log format (cPanel domlogs)

[Definition]
# Match any request - captures IP for counting
# Combined log: IP - - [date] "METHOD /path HTTP/x.x" ...
failregex = ^<HOST> - .*

# Exclude known crawlers + whitelisted IPs (see whitelist-ips.conf)
# Crawlers: Google, Bing, Facebook. Whitelist: run ./update-whitelist.sh after editing whitelist-ips.conf
ignoreregex = ^66\.249\.|^2a03:2880|^173\.208\.207\.|^40\.77\.|^207\.46\.|googlebot|bingbot|meta-webindexer|facebookexternalhit|^173\.208\.207\.(168|169|170|171|172|173|174|175)|^173\.208\.157\.(32|33|34|35|36|37|38|39)|^204\.12\.247\.(40|41|42|43|44|45|46|47)
